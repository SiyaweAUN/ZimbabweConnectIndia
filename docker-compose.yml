version: '3.9'

# =============================================
# ZimbabweConnectIndia — Docker Compose
# Runs: MongoDB + Backend API + Frontend
# =============================================

services:
  # ── MongoDB ────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: zci_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: zci_mongo_password
      MONGO_INITDB_DATABASE: zimbabwe_connect_india
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - zci_network

  # ── Backend API ────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zci_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:zci_mongo_password@mongodb:27017/zimbabwe_connect_india?authSource=admin
      JWT_SECRET: change_this_to_a_very_long_random_secret_in_production
      JWT_EXPIRE: 7d
      CLIENT_URL: http://localhost:3000
      ADMIN_SECRET: change_this_admin_secret
    ports:
      - '5000:5000'
    depends_on:
      - mongodb
    volumes:
      - uploads:/app/uploads
    networks:
      - zci_network

  # ── Frontend ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: zci_frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    ports:
      - '3000:80'
    depends_on:
      - backend
    networks:
      - zci_network

volumes:
  mongo_data:
  uploads:

networks:
  zci_network:
    driver: bridge
